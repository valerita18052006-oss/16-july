<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family: Georgia, serif;
    background: linear-gradient(135deg, #0f172a, #312e81, #581c87);
    color:white;
    text-align:center;
}

h1{
    font-size:3rem;
    font-weight:300;
    max-width:800px;
    margin-bottom:50px;
    padding:0 20px;
}

button{
    padding:18px 40px;
    border:none;
    border-radius:50px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:1.1rem;
    cursor:pointer;
    backdrop-filter: blur(10px);
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:rgba(255,255,255,0.25);
}
</style>
</head>

<body>

<h1>Some stories deserve more than a message.</h1>

<button>Tourner la première page ✨</button>

</body>
</html>
